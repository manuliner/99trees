# Weekly dependency update PRs for root pnpm workspace and GitHub Actions.
# Security alerts are separate (GitHub → Dependabot alerts); merge PRs after ci.yml passes.

version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: chore(deps)
      include: scope
    groups:
      nuxt-ecosystem:
        patterns:
          - nuxt
          - "@nuxt/*"
          - "@nuxthub/*"
          - "@nuxtjs/*"
        update-types:
          - minor
          - patch
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: chore(deps)
      include: scope
