name: Deploy via SSH + container restart

# Production only (trees.loco.vision). Triggers after build.yml or manual dispatch.
# SSH: backup → 99trees-restart-container prod <tag> → /api/health + /version.json.
# Does NOT run nixos-rebuild — host/module changes via ticketing ./deploy.sh.

on:
  workflow_run:
    workflows: ["Build Docker Image"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      version:
        description: 'Immutable image tag (e.g. 1.0.2) — empty = read ticketing/environments/99trees-prod.nix'
        required: false
        type: string

env:
  REGISTRY: docker.io
  IMAGE_NAME: manulinger/99trees
  SERVER_HOST_DEFAULT: 185.232.69.172
  SERVER_HOST_ALIAS: pretix-server-01
  PROD_BASE_URL: https://trees.loco.vision
  PROD_HEALTH_URL: https://trees.loco.vision/api/health
  PROD_VERSION_URL: https://trees.loco.vision/version.json
  TICKETING_REPO: zugvoegel-festival/ticketing

jobs:
  deploy-production:
    name: Deploy to Production ${{ github.event.workflow_run.head_branch != '' && format('({0})', github.event.workflow_run.head_branch) || '' }}
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       !startsWith(github.event.workflow_run.head_branch, 'refs/tags/test') &&
       !startsWith(github.event.workflow_run.head_branch, 'test') &&
       (startsWith(github.event.workflow_run.head_branch, 'refs/tags/v') ||
        (github.event.workflow_run.head_branch != '' && startsWith(github.event.workflow_run.head_branch, 'v')))) ||
      github.event_name == 'workflow_dispatch'
    environment: production
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Checkout ticketing (image pins)
        uses: actions/checkout@v6
        with:
          repository: ${{ env.TICKETING_REPO }}
          path: ticketing
          ref: main

      - name: Extract and validate version tag
        id: version
        run: |
          HEAD_BRANCH="${{ github.event.workflow_run.head_branch }}"
          TAG_NAME=""
          VERSION=""

          if [[ -n "$HEAD_BRANCH" ]] && ([[ "$HEAD_BRANCH" =~ ^refs/tags/test ]] || [[ "$HEAD_BRANCH" =~ ^test ]]); then
            echo "::error::Test tag in production deployment: $HEAD_BRANCH"
            exit 1
          fi

          if [[ "$HEAD_BRANCH" =~ ^refs/tags/v(.+)$ ]]; then
            TAG_NAME="${HEAD_BRANCH#refs/tags/}"
            VERSION="${BASH_REMATCH[1]}"
          elif [[ "$HEAD_BRANCH" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            TAG_NAME="$HEAD_BRANCH"
            VERSION="${BASH_REMATCH[1]}"
          fi

          if [[ -n "$VERSION" ]]; then
            git fetch --tags --quiet || true
            if git branch -r --contains "$TAG_NAME" | grep -qE "origin/(master|main)"; then
              echo "✅ Tag $TAG_NAME is on master/main"
            else
              echo "::error::Tag $TAG_NAME is NOT on master/main branch"
              exit 1
            fi
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [[ "${{ github.ref }}" =~ ^refs/tags/v(.+)$ ]]; then
            VERSION="${BASH_REMATCH[1]}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ -n "${{ github.event.inputs.version }}" ]]; then
              VERSION="${{ github.event.inputs.version }}"
            else
              VERSION=$(grep 'app-image' ticketing/environments/99trees-prod.nix \
                | sed -n 's/.*app-image = "manulinger\/99trees:\([^"]*\)";.*/\1/p')
            fi
            if [[ -z "$VERSION" ]]; then
              echo "::error::Could not resolve version for manual deploy"
              exit 1
            fi
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "⚠️  Manual deploy: using version $VERSION"
          else
            echo "::error::Could not extract version for production deployment"
            exit 1
          fi

      - name: Resolve Docker image tag
        id: docker-tag
        run: |
          NIX_TAG=$(grep 'app-image' ticketing/environments/99trees-prod.nix \
            | sed -n 's/.*app-image = "manulinger\/99trees:\([^"]*\)";.*/\1/p')
          if [[ -n "${{ github.event.inputs.version }}" ]]; then
            DOCKER_TAG="${{ github.event.inputs.version }}"
          elif [[ -n "${{ steps.version.outputs.version }}" ]]; then
            DOCKER_TAG="${{ steps.version.outputs.version }}"
          elif [[ -n "$NIX_TAG" ]]; then
            DOCKER_TAG="$NIX_TAG"
          else
            echo "::error::Could not resolve Docker image tag"
            exit 1
          fi
          echo "tag=$DOCKER_TAG" >> $GITHUB_OUTPUT
          echo "Docker tag: $DOCKER_TAG (nix pin: ${NIX_TAG:-none})"

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          if [ -z "${{ secrets.SSH_KNOWN_HOSTS }}" ]; then
            echo "::error::SSH_KNOWN_HOSTS secret is required. Populate with: ssh-keyscan -H 185.232.69.172"
            exit 1
          fi
          SSH_HOST="${{ secrets.SSH_HOST }}"
          if [ -z "$SSH_HOST" ]; then
            SSH_HOST="${{ env.SERVER_HOST_DEFAULT }}"
          fi
          {
            echo "Host ${{ env.SERVER_HOST_ALIAS }}"
            echo "  HostName $SSH_HOST"
            echo "  User deploy"
            echo "  StrictHostKeyChecking yes"
          } >> ~/.ssh/config
          chmod 600 ~/.ssh/config
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Verify SSH connection
        run: ssh ${{ env.SERVER_HOST_ALIAS }} "echo 'SSH connection successful'"

      - name: Pre-deployment backup with version
        run: |
          VERSION="${{ steps.docker-tag.outputs.tag }}"
          ssh ${{ env.SERVER_HOST_ALIAS }} "sudo 99trees-deploy-backup prod predeploy-v${VERSION}"

      - name: Deploy image (runtime pin + restart)
        run: |
          TAG="${{ steps.docker-tag.outputs.tag }}"
          echo "Deploying 99trees prod → $TAG"
          ssh ${{ env.SERVER_HOST_ALIAS }} "sudo 99trees-restart-container prod $TAG"

      - name: Wait for service
        run: sleep 10

      - name: Health check with version verification
        id: health-check
        run: |
          HEALTH_URL="${{ env.PROD_HEALTH_URL }}"
          VERSION_URL="${{ env.PROD_VERSION_URL }}"
          echo "Liveness: $HEALTH_URL"
          HEALTH_RESPONSE=$(curl -sf --retry 5 --retry-delay 5 --retry-connrefused "$HEALTH_URL")
          HEALTH_STATUS=$(echo "$HEALTH_RESPONSE" | grep -o '"status":"[^"]*"' | cut -d'"' -f4 || echo "")
          if [[ "$HEALTH_STATUS" != "ok" ]]; then
            echo "::error::Health check failed (expected status ok)"
            echo "$HEALTH_RESPONSE"
            exit 1
          fi
          echo "✅ Liveness OK"

          echo "Version: $VERSION_URL"
          VERSION_RESPONSE=$(curl -sf --retry 5 --retry-delay 5 --retry-connrefused "$VERSION_URL")
          DEPLOYED_VERSION=$(echo "$VERSION_RESPONSE" | grep -o '"version":"[^"]*"' | cut -d'"' -f4 || echo "")
          if [ -z "$DEPLOYED_VERSION" ]; then
            echo "::error::Could not extract version from version.json"
            echo "$VERSION_RESPONSE"
            exit 1
          fi
          echo "deployed_version=$DEPLOYED_VERSION" >> $GITHUB_OUTPUT

          EXPECTED_VERSION="${{ steps.version.outputs.version }}"
          if [[ -z "$EXPECTED_VERSION" ]]; then
            EXPECTED_VERSION="${{ steps.docker-tag.outputs.tag }}"
          fi
          if [[ "$DEPLOYED_VERSION" == "$EXPECTED_VERSION" ]]; then
            echo "✅ Version match: $DEPLOYED_VERSION"
          else
            echo "::error::Version mismatch: expected $EXPECTED_VERSION, got $DEPLOYED_VERSION"
            echo "$VERSION_RESPONSE" | jq . 2>/dev/null || echo "$VERSION_RESPONSE"
            exit 1
          fi

      - name: Deployment summary
        run: |
          {
            echo "## Production Deployment Summary - v${{ steps.health-check.outputs.deployed_version }}"
            echo "- **Environment:** Production"
            echo "- **Server:** ${{ env.SERVER_HOST_ALIAS }}"
            echo "- **Version:** ${{ steps.health-check.outputs.deployed_version }}"
            echo "- **Image:** ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.docker-tag.outputs.tag }}"
            echo "- **URL:** https://trees.loco.vision"
            echo "- **Deployed at:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          } >> $GITHUB_STEP_SUMMARY
