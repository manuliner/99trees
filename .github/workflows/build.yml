name: Build Docker Image

# Sibling workflow: deploy.yml (auto-triggered after a successful build).
#
# Production only (trees.loco.vision). Version format: v*.*.* -> "X.Y.Z".
#
# Trigger:
# - v*.*.* tags        -> Production build, image tagged :X.Y.Z + :prod-latest
# - workflow_dispatch  -> Manual build of any tag/ref

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag or ref to build (e.g. v1.0.3)'
        required: false
        type: string

env:
  REGISTRY: docker.io
  IMAGE_NAME: manulinger/99trees

jobs:
  build:
    name: Build Docker Image - ${{ github.ref_name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.33.2

      - name: Get package version and commit hash
        id: base-info
        run: |
          REPO_ROOT=$(git rev-parse --show-toplevel)
          if [ -f "$REPO_ROOT/web/package.json" ]; then
            PKG_PATH="$REPO_ROOT/web/package.json"
          else
            PKG_PATH="$REPO_ROOT/package.json"
          fi
          VERSION=$(node -p "require('$PKG_PATH').version")
          COMMIT_HASH=$(git rev-parse --short HEAD)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "hash=$COMMIT_HASH" >> $GITHUB_OUTPUT
          echo "Package version: $VERSION"
          echo "Commit hash: $COMMIT_HASH"

      - name: Determine version + environment
        id: version-env
        run: |
          BASE_VERSION="${{ steps.base-info.outputs.version }}"
          COMMIT_HASH="${{ steps.base-info.outputs.hash }}"
          REF="${{ github.ref }}"

          if [[ "$REF" =~ ^refs/tags/(.+)$ ]]; then
            TAG_NAME="${BASH_REMATCH[1]}"
            echo "Tag: $TAG_NAME"

            if [[ "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] || [[ "$TAG_NAME" == "prod" ]]; then
              APP_VERSION="$BASE_VERSION"
              ENVIRONMENT="production"
              IMAGE_TAG="latest"
              VERSION_TAG="$BASE_VERSION"
              LATEST_TAG="prod-latest"
            elif [[ "$TAG_NAME" == "test" ]] || [[ "$TAG_NAME" =~ ^test- ]]; then
              if [[ "$TAG_NAME" =~ ^test-([0-9]+\.[0-9]+\.[0-9]+)-([0-9]+)$ ]]; then
                APP_VERSION="${BASH_REMATCH[1]}-${BASH_REMATCH[2]}"
              elif [[ "$TAG_NAME" =~ ^test-([0-9]+)$ ]]; then
                APP_VERSION="$BASE_VERSION-${BASH_REMATCH[1]}"
              elif [[ "$TAG_NAME" =~ ^test-build\.([0-9]+)$ ]]; then
                APP_VERSION="$BASE_VERSION-${BASH_REMATCH[1]}"
              else
                APP_VERSION="$BASE_VERSION-${TAG_NAME#test-}"
              fi
              ENVIRONMENT="test"
              IMAGE_TAG="test"
              VERSION_TAG="$TAG_NAME"
              LATEST_TAG="test-latest"
            else
              APP_VERSION="$BASE_VERSION-$COMMIT_HASH"
              ENVIRONMENT="test"
              IMAGE_TAG="test"
              VERSION_TAG="$TAG_NAME"
              LATEST_TAG="test-latest"
            fi
          else
            APP_VERSION="$BASE_VERSION-$COMMIT_HASH"
            ENVIRONMENT="test"
            IMAGE_TAG="test"
            VERSION_TAG=""
            LATEST_TAG="test-latest"
          fi

          echo "app_version=$APP_VERSION" >> $GITHUB_OUTPUT
          echo "environment=$ENVIRONMENT" >> $GITHUB_OUTPUT
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "version_tag=$VERSION_TAG" >> $GITHUB_OUTPUT
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "APP_VERSION:  $APP_VERSION"
          echo "ENVIRONMENT:  $ENVIRONMENT"
          echo "LATEST_TAG:   $LATEST_TAG"

      - name: Generate image tags
        id: tags
        run: |
          TAGS="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version-env.outputs.image_tag }}"
          if [[ -n "${{ steps.version-env.outputs.version_tag }}" ]]; then
            TAGS="$TAGS,${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version-env.outputs.version_tag }}"
          fi
          if [[ -n "${{ steps.version-env.outputs.latest_tag }}" ]]; then
            TAGS="$TAGS,${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version-env.outputs.latest_tag }}"
          fi
          echo "tags=$TAGS" >> $GITHUB_OUTPUT
          echo "Generated tags: $TAGS"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Generate build time
        id: build-time
        run: |
          BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "build_time=${BUILD_TIME}" >> $GITHUB_OUTPUT
          echo "BUILD_TIME: ${BUILD_TIME}"

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            APP_VERSION=${{ steps.version-env.outputs.app_version }}
            BUILD_TIME=${{ steps.build-time.outputs.build_time }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build summary
        run: |
          echo "## Build Summary - v${{ steps.version-env.outputs.app_version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** ${{ steps.version-env.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Base Version:** ${{ steps.base-info.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **App Version:** ${{ steps.version-env.outputs.app_version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit Hash:** ${{ steps.base-info.outputs.hash }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image Tag:** ${{ steps.version-env.outputs.image_tag }}" >> $GITHUB_STEP_SUMMARY
          if [[ -n "${{ steps.version-env.outputs.version_tag }}" ]]; then
            echo "- **Version Tag:** ${{ steps.version-env.outputs.version_tag }}" >> $GITHUB_STEP_SUMMARY
          fi
          if [[ -n "${{ steps.version-env.outputs.latest_tag }}" ]]; then
            echo "- **Latest Tag:** ${{ steps.version-env.outputs.latest_tag }}" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- **Image:** ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version-env.outputs.image_tag }}" >> $GITHUB_STEP_SUMMARY
