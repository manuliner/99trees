name: Rollback Docker image

# Production only: re-point prod-latest, then 99trees-restart-container prod <tag>.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Immutable image tag to roll back TO (e.g. 1.0.2)'
        required: true
        type: string
      skip_health_check:
        description: 'Skip /api/health verification (emergency only)'
        required: false
        type: boolean
        default: false

env:
  REGISTRY: docker.io
  IMAGE_NAME: manulinger/99trees
  SERVER_HOST_DEFAULT: 185.232.69.172
  SERVER_HOST_ALIAS: pretix-server-01
  PROD_HEALTH_URL: https://trees.loco.vision/api/health
  PROD_VERSION_URL: https://trees.loco.vision/version.json

jobs:
  rollback-production:
    name: Rollback production → ${{ github.event.inputs.version }}
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          if [ -z "${{ secrets.SSH_KNOWN_HOSTS }}" ]; then
            echo "::error::SSH_KNOWN_HOSTS secret is required. Populate with: ssh-keyscan -H 185.232.69.172"
            exit 1
          fi
          SSH_HOST="${{ secrets.SSH_HOST }}"
          if [ -z "$SSH_HOST" ]; then
            SSH_HOST="${{ env.SERVER_HOST_DEFAULT }}"
          fi
          {
            echo "Host ${{ env.SERVER_HOST_ALIAS }}"
            echo "  HostName $SSH_HOST"
            echo "  User deploy"
            echo "  StrictHostKeyChecking yes"
          } >> ~/.ssh/config
          chmod 600 ~/.ssh/config
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Verify SSH connection
        run: ssh ${{ env.SERVER_HOST_ALIAS }} "echo 'SSH OK'"

      - name: Pre-rollback backup (prod data)
        run: |
          VERSION="${{ github.event.inputs.version }}"
          ssh ${{ env.SERVER_HOST_ALIAS }} "sudo 99trees-deploy-backup prod rollback-pre-v${VERSION}"

      - name: Re-tag floating pointer on registry
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          SRC="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}"
          DST="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:prod-latest"
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker pull "$SRC"
          docker tag "$SRC" "$DST"
          docker push "$DST"

      - name: Roll back runtime image and restart
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          ssh ${{ env.SERVER_HOST_ALIAS }} "sudo 99trees-restart-container prod $VERSION"

      - name: Wait for service
        run: sleep 10

      - name: Health check
        if: ${{ github.event.inputs.skip_health_check != true && github.event.inputs.skip_health_check != 'true' }}
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          HEALTH=$(curl -sf --retry 5 --retry-delay 5 --retry-connrefused "${{ env.PROD_HEALTH_URL }}")
          STATUS=$(echo "$HEALTH" | grep -o '"status":"[^"]*"' | cut -d'"' -f4)
          [[ "$STATUS" == "ok" ]] || { echo "::error::Health check failed"; echo "$HEALTH"; exit 1; }

          VERSION_JSON=$(curl -sf --retry 5 --retry-delay 5 --retry-connrefused "${{ env.PROD_VERSION_URL }}")
          GOT=$(echo "$VERSION_JSON" | jq -r '.version // empty')
          [[ "$GOT" == "$VERSION" ]] || { echo "::error::Version mismatch (expected $VERSION, got $GOT)"; echo "$VERSION_JSON"; exit 1; }

      - name: Summary
        run: |
          {
            echo "## Rollback production → \`${{ github.event.inputs.version }}\`"
            echo "- **URL:** https://trees.loco.vision"
          } >> $GITHUB_STEP_SUMMARY
