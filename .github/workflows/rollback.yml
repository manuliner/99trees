name: Rollback Docker image

# Manual only: re-point test-latest / prod-latest at a known-good immutable tag.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Which instance to roll back'
        required: true
        type: choice
        options:
          - test
          - production
      version:
        description: 'Immutable image tag (e.g. 0.0.2, test-0.0.1-3)'
        required: true
        type: string
      skip_health_check:
        description: 'Skip /api/health verification (emergency only)'
        required: false
        type: boolean
        default: false

env:
  REGISTRY: docker.io
  IMAGE_NAME: manulinger/99trees
  SERVER_HOST_DEFAULT: 185.232.69.172
  SERVER_HOST_ALIAS: pretix-server-01
  TEST_HEALTH_URL: https://test.spiel.zugvoegelfestival.org/api/health
  PROD_HEALTH_URL: https://spiel.zugvoegelfestival.org/api/health

jobs:
  rollback-test:
    name: Rollback test → ${{ github.event.inputs.version }}
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'test'
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          SSH_HOST="${{ secrets.SSH_HOST }}"
          [ -z "$SSH_HOST" ] && SSH_HOST="${{ env.SERVER_HOST_DEFAULT }}"
          {
            echo "Host ${{ env.SERVER_HOST_ALIAS }}"
            echo "  HostName $SSH_HOST"
            echo "  User deploy"
            echo "  StrictHostKeyChecking no"
          } >> ~/.ssh/config
          chmod 600 ~/.ssh/config
          [ -n "${{ secrets.SSH_KNOWN_HOSTS }}" ] && echo "${{ secrets.SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts

      - name: Verify SSH connection
        run: ssh ${{ env.SERVER_HOST_ALIAS }} "echo 'SSH OK'"

      - name: Pre-rollback backup (test data)
        run: |
          ssh ${{ env.SERVER_HOST_ALIAS }} "sudo 99trees-deploy-backup test rollback-pre" || true

      - name: Re-tag floating pointer on registry
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          SRC="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}"
          DST="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:test-latest"
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker pull "$SRC"
          docker tag "$SRC" "$DST"
          docker push "$DST"
          echo "Pushed $DST → same image as $SRC"

      - name: Pull and restart on host
        run: |
          FLOATING="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:test-latest"
          ssh ${{ env.SERVER_HOST_ALIAS }} "sudo docker pull $FLOATING && sudo systemctl restart docker-99trees-test.service"

      - name: Wait for service
        run: sleep 10

      - name: Health check
        if: ${{ github.event.inputs.skip_health_check != true && github.event.inputs.skip_health_check != 'true' }}
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          R=$(curl -sf --retry 5 --retry-delay 5 --retry-connrefused "${{ env.TEST_HEALTH_URL }}")
          GOT=$(echo "$R" | grep -o '"version":"[^"]*"' | cut -d'"' -f4)
          if [[ "$VERSION" =~ ^test-([0-9]+\.[0-9]+\.[0-9]+)-([0-9]+)$ ]]; then
            EXPECTED="${BASH_REMATCH[1]}-${BASH_REMATCH[2]}"
          else
            EXPECTED="${VERSION#test-}"
          fi
          if [[ "$GOT" == "$EXPECTED" ]] || [[ "$GOT" == "$EXPECTED"* ]]; then
            echo "OK"
          else
            echo "::error::Health version mismatch (expected $EXPECTED, got $GOT)"
            echo "$R"
            exit 1
          fi

      - name: Summary
        run: |
          echo "## Rollback test → \`${{ github.event.inputs.version }}\`" >> $GITHUB_STEP_SUMMARY

  rollback-production:
    name: Rollback production → ${{ github.event.inputs.version }}
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production'
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          SSH_HOST="${{ secrets.SSH_HOST }}"
          [ -z "$SSH_HOST" ] && SSH_HOST="${{ env.SERVER_HOST_DEFAULT }}"
          {
            echo "Host ${{ env.SERVER_HOST_ALIAS }}"
            echo "  HostName $SSH_HOST"
            echo "  User deploy"
            echo "  StrictHostKeyChecking no"
          } >> ~/.ssh/config
          chmod 600 ~/.ssh/config
          [ -n "${{ secrets.SSH_KNOWN_HOSTS }}" ] && echo "${{ secrets.SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts

      - name: Verify SSH connection
        run: ssh ${{ env.SERVER_HOST_ALIAS }} "echo 'SSH OK'"

      - name: Pre-rollback backup (prod data)
        run: |
          VERSION="${{ github.event.inputs.version }}"
          ssh ${{ env.SERVER_HOST_ALIAS }} "sudo 99trees-deploy-backup prod rollback-pre-v${VERSION}"

      - name: Re-tag floating pointer on registry
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          SRC="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}"
          DST="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:prod-latest"
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker pull "$SRC"
          docker tag "$SRC" "$DST"
          docker push "$DST"

      - name: Pull and restart on host
        run: |
          FLOATING="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:prod-latest"
          ssh ${{ env.SERVER_HOST_ALIAS }} "sudo docker pull $FLOATING && sudo systemctl restart docker-99trees-prod.service"

      - name: Wait for service
        run: sleep 10

      - name: Health check
        if: ${{ github.event.inputs.skip_health_check != true && github.event.inputs.skip_health_check != 'true' }}
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          R=$(curl -sf --retry 5 --retry-delay 5 --retry-connrefused "${{ env.PROD_HEALTH_URL }}")
          GOT=$(echo "$R" | grep -o '"version":"[^"]*"' | cut -d'"' -f4)
          [[ "$GOT" == "$VERSION" ]] || { echo "::error::Version mismatch (expected $VERSION, got $GOT)"; echo "$R"; exit 1; }

      - name: Summary
        run: |
          echo "## Rollback production → \`${{ github.event.inputs.version }}\`" >> $GITHUB_STEP_SUMMARY
